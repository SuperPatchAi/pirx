services:
  - type: web
    name: pirx-backend
    runtime: python
    rootDir: pirx-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: pirx-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: pirx-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: pirx-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://pirx-theta.vercel.app","http://localhost:3001"]'
      - key: FRONTEND_URL
        value: https://pirx-theta.vercel.app
      - key: TERRA_API_KEY
        sync: false
      - key: TERRA_DEV_ID
        sync: false
      - key: TERRA_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: worker
    name: pirx-celery-worker
    runtime: python
    rootDir: pirx-backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.tasks worker --loglevel=info --concurrency=2
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: pirx-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: pirx-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: pirx-redis
          type: redis
          property: connectionString
      - key: TERRA_API_KEY
        sync: false
      - key: TERRA_DEV_ID
        sync: false
      - key: TERRA_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: redis
    name: pirx-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
