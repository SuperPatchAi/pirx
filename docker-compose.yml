version: "3.9"

services:
  backend:
    build: ./pirx-backend
    ports:
      - "8001:8000"
    env_file:
      - ./pirx-backend/.env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  celery-worker:
    build: ./pirx-backend
    command: celery -A app.tasks worker --loglevel=info --concurrency=2
    env_file:
      - ./pirx-backend/.env
    depends_on:
      - redis
    restart: unless-stopped

  celery-beat:
    build: ./pirx-backend
    command: celery -A app.tasks beat --loglevel=info
    env_file:
      - ./pirx-backend/.env
    depends_on:
      - redis
    restart: unless-stopped
